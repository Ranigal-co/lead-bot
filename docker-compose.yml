version: "3.9"

services:
  bot:
    build: .
    container_name: photobot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    volumes:
      - ./data:/app/data
